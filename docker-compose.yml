version: '3.9'

services:

  # ── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: softbrainchat-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: softbrainchat
    networks:
      - app-network

  # ── Express Server ─────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: softbrainchat-server
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    environment:
      NODE_ENV: production
      PORT: 5000
      # MongoDB — Docker network এ 'mongo' hostname ব্যবহার করো
      MONGO_URI: mongodb://mongo:27017/softbrainchat
      CLIENT_URL: ${CLIENT_URL}
      # Firebase
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Pinecone
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_ENVIRONMENT: ${PINECONE_ENVIRONMENT}
      PINECONE_INDEX: ${PINECONE_INDEX}
      # Meta
      META_APP_ID: ${META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      # Stripe
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID}
      STRIPE_PROMAX_PRICE_ID: ${STRIPE_PROMAX_PRICE_ID}
    volumes:
      - ./server/uploads:/app/uploads
    networks:
      - app-network

  # ── React Client ───────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: softbrainchat-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server
    networks:
      - app-network

volumes:
  mongo_data:

networks:
  app-network:
    driver: bridge